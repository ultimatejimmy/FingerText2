name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [Win32, x64]
    name: Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build ${{ matrix.platform }} Release
        run: |
          msbuild FingerText.vcxproj `
            /m `
            /p:Configuration="Unicode Release" `
            /p:Platform="${{ matrix.platform }}" `
            /p:PlatformToolset=v143

      - name: Locate DLL
        id: locate
        shell: pwsh
        run: |
          if ("${{ matrix.platform }}" -eq "x64") {
            $dll = "x64\Unicode Release\FingerText.dll"
          } else {
            $dll = "Unicode Release\FingerText.dll"
          }
          echo "dll=$dll" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FingerText-${{ matrix.platform }}
          path: ${{ steps.locate.outputs.dll }}
          if-no-files-found: error

name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [Win32, x64]
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout (raw git)
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/${{ github.repository }}.git .
          git fetch origin ${{ github.sha }}
          git checkout ${{ github.sha }}

      - name: Locate MSBuild via vswhere
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) { throw "MSBuild not found" }
          Write-Host "Using MSBuild at: $msbuild"
          Add-Content -Path $env:GITHUB_PATH -Value (Split-Path $msbuild)

      - name: Show available Windows SDKs
        shell: pwsh
        run: |
          Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include" -Directory -ErrorAction SilentlyContinue | Select-Object Name

      - name: Build ${{ matrix.platform }} Release
        shell: cmd
        run: |
          msbuild FingerText.vcxproj ^
            /m ^
            /p:Configuration="Unicode Release" ^
            /p:Platform="${{ matrix.platform }}" ^
            /p:PlatformToolset=v143 ^
            /p:WindowsTargetPlatformVersion=10.0 ^
            /fileLogger ^
            /fileLoggerParameters:LogFile=msbuild-${{ matrix.platform }}.log;Verbosity=normal

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-log-${{ matrix.platform }}
          path: msbuild-${{ matrix.platform }}.log
          if-no-files-found: warn

      - name: Locate DLL
        id: locate
        shell: pwsh
        run: |
          if ("${{ matrix.platform }}" -eq "x64") {
            $dll = "x64\Unicode Release\FingerText.dll"
          } else {
            $dll = "Unicode Release\FingerText.dll"
          }
          echo "dll=$dll" >> $env:GITHUB_OUTPUT

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: FingerText-${{ matrix.platform }}
          path: ${{ steps.locate.outputs.dll }}
          if-no-files-found: error
